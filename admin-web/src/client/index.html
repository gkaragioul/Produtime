<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProduTime Admin Console</title>

  <!-- Browser tab icon -->
  <link rel="icon" type="image/png" href="assets/PTAdminIcon.png">

  <!-- iOS / iPadOS "Add to Home Screen" -->
  <link rel="apple-touch-icon" href="assets/PTAdminIcon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/PTAdminIcon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ProduTime">

  <!-- Android / Chrome "Install app" -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="ProduTime Admin">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #f5f5f5;
    }
    #root {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
