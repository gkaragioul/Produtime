version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: produtime-licensing-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: produtime_licensing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: produtime-licensing-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/produtime_licensing?schema=public
      ADMIN_JWT_SECRET: dev-jwt-secret-change-in-production
      ADMIN_REFRESH_SECRET: dev-refresh-secret-change-in-production
      ED25519_PRIVATE_KEY: ${ED25519_PRIVATE_KEY}
      ED25519_PUBLIC_KEY: ${ED25519_PUBLIC_KEY}
      CORS_ORIGIN: http://localhost:5173
      DEFAULT_ADMIN_EMAIL: admin@produtime.local
      DEFAULT_ADMIN_PASSWORD: change-me-on-first-login
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
