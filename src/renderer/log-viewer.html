<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlianFlow - Debug Logs</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            overflow: hidden;
        }
        
        #root {
            width: 100vw;
            height: 100vh;
        }
        
        /* Loading styles */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f8f9fa;
        }
        
        .loading-spinner {
            font-size: 18px;
            color: #6c757d;
        }
        
        /* Error styles */
        .error-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
        }
        
        .error-title {
            color: #dc3545;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .error-message {
            color: #6c757d;
            font-size: 16px;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-container">
            <div class="loading-spinner">Loading AtlianFlow Debug Logs...</div>
        </div>
    </div>

    <script>
        // Check if electronAPI is available
        if (typeof window.electronAPI === 'undefined') {
            document.getElementById('root').innerHTML = `
                <div class="error-container">
                    <div class="error-title">Error</div>
                    <div class="error-message">
                        Electron API not available. This window must be opened from within the AtlianFlow application.
                    </div>
                </div>
            `;
        } else {
            // Load the React log viewer component
            const script = document.createElement('script');
            script.src = './log-viewer-bundle.js';
            script.onerror = function() {
                document.getElementById('root').innerHTML = `
                    <div class="error-container">
                        <div class="error-title">Error</div>
                        <div class="error-message">
                            Failed to load log viewer. Please ensure the application is properly built.
                        </div>
                    </div>
                `;
            };
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
